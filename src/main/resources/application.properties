spring.application.name=ticketing
server.port=${PORT:8080}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/ticketing?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:ticketing_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:ticketing_pass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
security.jwt.secret=${SECURITY_JWT_SECRET:change-this-secret-to-a-long-random-value}
security.jwt.issuer=${SECURITY_JWT_ISSUER:ticketing}
security.jwt.expiration-seconds=${SECURITY_JWT_EXPIRATION_SECONDS:3600}
